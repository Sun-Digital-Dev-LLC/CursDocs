# Cloudflare Pages configuration for Next.js static export

name = "cursdocs"

[build]
command = "pnpm run build"

# Specify the output directory for Pages
pages_build_output_dir = "out"

[env.production]
name = "cursdocs-production"

[env.preview]
name = "cursdocs-preview"

[build.environment]
NODE_VERSION = "18.18.0"