# Updated wrangler.toml configuration to match Cloudflare Pages requirements

name = "cursdocs"
compatibility_date = "2023-11-28"

# Specify where the built output will be located
[build]
command = "pnpm run build"

# This is the key property that Cloudflare Pages needs
[build.upload]
format = "directory"
dir = "out"  # Next.js export output folder

# Exclude patterns
[build.exclude]
files = [".next/cache/**"]

# Uncomment and use if needed for environment variables
# [env.production]
# MY_ENV_VARIABLE = "value"